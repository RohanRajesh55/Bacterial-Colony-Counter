# Alembic Configuration for CFU-Counter

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
# file_template = %%(rev)s_%%(slug)s

# Timezone to use for migration file names
# timezone =

# Max length of revision id
# truncate_slug_length = 40

# Revision file template
# revision_environment = false

# Output encoding for source files
# output_encoding = utf-8

# SQLAlchemy URL - overridden by env.py from settings
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Optional post-write hooks for formatting migrations
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[handler_file]
class = FileHandler
args = ('alembic.log',)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
