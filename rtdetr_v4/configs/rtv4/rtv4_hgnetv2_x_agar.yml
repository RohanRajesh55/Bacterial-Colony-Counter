# RT-DETR v4 HGNetv2-X for AGAR Colony Detection (with DINOv3 distillation)
# Full RT-DETR v4 configuration with Vision Foundation Model distillation
# Requires DINOv3 teacher model setup (see README for instructions)

__include__: [
  '../dfine/dfine_hgnetv2_x_agar.yml',
  '../base/rtv4.yml'
]

output_dir: ./outputs/rtv4_hgnetv2_x_agar

# DINOv3 Teacher Model Configuration
# Download from: https://ai.meta.com/resources/models-and-libraries/dinov3-downloads/
# Clone repo: git clone https://github.com/facebookresearch/dinov3
teacher_model:
  type: "DINOv3TeacherModel"
  dinov3_repo_path: dinov3/
  dinov3_weights_path: pretrain/dinov3_vitb16_pretrain_lvd1689m.pth
  patch_size: 16
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

HybridEncoder:
  distill_teacher_dim: 768  # DINOv3 ViT-B output dimension

RTv4Criterion:
  num_classes: 7
  weight_dict:
    loss_distill: 15.0  # Distillation loss weight
  distill_adaptive_params:
    enabled: True
    rho: 2
    delta: 0.2
    default_weight: 15

DFINETransformer:
  num_classes: 7

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000005
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0003
  betas: [0.9, 0.999]
  weight_decay: 0.000125

# Training schedule
epoches: 58

flat_epoch: 29
no_aug_epoch: 8

train_dataloader:
  total_batch_size: 8  # Adjust based on GPU memory
  dataset:
    transforms:
      policy:
        epoch: [4, 29, 50]

  collate_fn:
    mixup_epochs: [4, 29]
    stop_epoch: 50
