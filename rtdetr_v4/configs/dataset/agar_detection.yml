# AGAR Dataset Configuration for CFU-Counter
# 7 bacterial colony classes for automated counting

task: detection

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

# Single-class colony detection (all species merged into 1 class)
num_classes: 1
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: data/agar/images/train
    ann_file: data/agar/annotations/instances_train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction

val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: data/agar/images/val
    ann_file: data/agar/annotations/instances_val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
